version: '3.3'

networks:
  # 使用变量定义网络名，确保多项目隔离
  default_net:
    driver: bridge

services:
  # === 服务1: SSH 隧道 (负责打洞) ===
  tunnel:
    image: alpine:latest
    container_name: tunnel_${PROJECT_NAME}
    networks:
      - default_net
    restart: always
    environment:
      SSH_HOST: ${SSH_HOST}
      SSH_PORT: ${SSH_PORT}
      SSH_USER: ${SSH_USER}
      SSH_PASSWORD: ${SSH_PASSWORD}
      REMOTE_DB_PORT: ${REMOTE_DB_PORT}
    volumes:
      # 🔑 共享密钥: 挂载指定路径的私钥文件
      - ../id_rsa/id_rsa_backup:/root/.ssh/id_rsa
    command: >
      sh -c "
      apk add --no-cache openssh-client sshpass &&
      mkdir -p /root/.ssh &&
      chmod 700 /root/.ssh &&
      if [ -s /root/.ssh/id_rsa ]; then
        chmod 600 /root/.ssh/id_rsa
        echo '>>> 使用 SSH Key 连接...'
        ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -N -L 0.0.0.0:3306:127.0.0.1:${REMOTE_DB_PORT} -p ${SSH_PORT} ${SSH_USER}@${SSH_HOST}
      else
        echo '>>> 使用 SSH 密码连接 (Key为空或不存在)...'
        if [ -z '${SSH_PASSWORD}' ]; then echo 'Error: 没有找到 id_rsa 也没有配置 SSH_PASSWORD'; exit 1; fi
        sshpass -p '${SSH_PASSWORD}' ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -N -L 0.0.0.0:3306:127.0.0.1:${REMOTE_DB_PORT} -p ${SSH_PORT} ${SSH_USER}@${SSH_HOST}
      fi
      "

  # === 服务2: 数据库 (通过隧道连接) ===
  db:
    image: mysql:8.0
    container_name: backup_${PROJECT_NAME}
    networks:
      - default_net
    restart: always
    depends_on:
      - tunnel
    # ⚡️ 每个 Slave 必须有唯一的 server-id
    # Master 通常为 1，每个 Slave 需要不同的 ID (如: 100, 101, 102...)
    # 通过 .env 中的 SERVER_ID 变量配置
    command: >
      bash -c "
      nohup bash /docker-entrypoint-initdb.d/init-slave.sh > /var/log/slave_monitor.log 2>&1 &
      docker-entrypoint.sh mysqld
      --default-authentication-plugin=mysql_native_password
      --server-id=${SERVER_ID:-100}
      --log-bin=mysql-bin
      --binlog-format=ROW
      --gtid-mode=ON
      --enforce-gtid-consistency=ON
      --read-only=1
      --log-slave-updates=ON
      --replicate-do-db=${TARGET_DB_NAME}
      "
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      # 关键点：这里连接的是 tunnel 服务的容器名
      MASTER_HOST: tunnel
      MASTER_PORT: 3306
      MASTER_USER: ${MASTER_USER}
      MASTER_PASSWORD: ${MASTER_PASSWORD}
    volumes:
      - ./data:/var/lib/mysql
      - ./init-slave.sh:/docker-entrypoint-initdb.d/init-slave.sh
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 1G

  # === 服务3: phpMyAdmin (可视化管理) ===
  pma:
    image: phpmyadmin/phpmyadmin
    container_name: pma_${PROJECT_NAME}
    networks:
      - default_net
    restart: always
    environment:
      # 告诉 PMA: 数据库就在隔壁容器 'db' 的 3306 端口 (这是容器内部端口，永远是 3306)
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      # 🔒 安全升级: 映射到宿主机的端口 (从 .env 读取 PMA_WEB_PORT)
      - "127.0.0.1:${PMA_WEB_PORT}:80"
    depends_on:
      - db